# Server
server.port=8080

# H2 In-Memory Database (for local development)
spring.datasource.url=jdbc:h2:mem:obsidian_curator;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=dev-secret-key-for-testing-only
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000
jwt.reset-token-expiry=600000

# Email (Gmail SMTP) - Configure with actual values for production
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Razorpay - Configure with actual values for production
razorpay.key.id=test-razorpay-key
razorpay.key.secret=test-razorpay-secret
razorpay.webhook.secret=test-webhook-secret

# Cloudinary - Configure with actual values for production
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret

# Frontend
frontend.url=http://localhost:5173

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
