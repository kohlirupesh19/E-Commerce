spring.datasource.url=${IT_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/obsidian_curator_db}}
spring.datasource.username=${IT_DB_USER:${DB_USERNAME:YOUR_DB_USER}}
spring.datasource.password=${IT_DB_PASSWORD:${DB_PASSWORD:YOUR_DB_PASSWORD}}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
